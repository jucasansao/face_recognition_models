# bumpversion config — targets pyproject.toml and __init__.py
[bumpversion]
current_version = 0.3.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:face_recognition_models/__init__.py]
search = __version__ = '{current_version}'
replace = __version__ = '{new_version}'

# flake8 does not yet support pyproject.toml natively
[flake8]
exclude =
    .github,
    .eggs,
    docs,
    .tox,
    dist,
    *.egg-info
max-line-length = 160
